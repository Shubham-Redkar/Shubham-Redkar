name: Generate Trophy SVG

on:
  schedule:
    - cron: "0 0 * * *"     
  workflow_dispatch: {}     
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Shubham-Redkar
          file: assets/trophy.svg
          theme: radical
          no-background: true
          no-frame: true
          margin-width: 8
          max-cols: 7
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/trophy.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update trophy SVG" && git push)
