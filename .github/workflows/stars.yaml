name: Generate Stars Badge

on:
  schedule:
    - cron: "0 0 * * *"     # runs once a day
  workflow_dispatch: {}      # lets you trigger it manually
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compute total stars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          TOTAL=$(gh api "users/Shubham-Redkar/repos?per_page=100&type=owner" --paginate \
            --jq '[.[] | select(.fork == false) | .stargazers_count] | add // 0')
          echo "Total stars: $TOTAL"
          cat > assets/stars.json << EOF
          {
            "schemaVersion": 1,
            "label": "stars",
            "message": "$TOTAL",
            "color": "7c3aed"
          }
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stars.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stars count" && git push)
